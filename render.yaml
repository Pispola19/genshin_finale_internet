# Blueprint Render.com: Web Service Python (Genshin Manager)
# Dashboard Render → New Blueprint → incolla questo repo, oppure crea Web Service a mano con gli stessi comandi.
services:
  - type: web
    name: genshin-finale-internet
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      # OBBLIGATORIA IN PRODUZIONE: senza di essa il servizio non si avvia (vedi web.app).
      # In Render → Environment aggiungi manualmente (non committare nel repo):
      #   GENSHIN_WEB_WRITE_PASSWORD = segreto noto agli amministratori
      # Gate login / protezione scritture (opzionale, fase successiva):
      #   GENSHIN_WEB_AUTH_ENABLED = 1   # solo con questo le API di scrittura richiedono login
      # Cookie sessione HTTPS: RENDER attiva SESSION_COOKIE_SECURE in app.
      # Opzionale: monta un Disco e punta i DB persistenti:
      # - key: GINSHIN_DATA_DIR
      #   value: /var/data
      # Whitelist: in produzione (Render) è sempre strict. In locale: GENSHIN_WHITELIST_STRICT=0 solo per dev.
      # - key: GENSHIN_WHITELIST_STRICT
      #   value: "1"
