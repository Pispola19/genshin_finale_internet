# Blueprint Render.com — servizio pubblico: https://genshin-finale-internet-1.onrender.com
# Collega questo repo in Render → Blueprint oppure Web Service manuale con gli stessi comandi.
# Dati persistenti: aggiungi un Disco, montalo (es. /var/data) e imposta GINSHIN_DATA_DIR.
services:
  - type: web
    name: genshin-finale-internet-1
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      # Sicurezza: in Render → Environment aggiungi (non committare la password):
      #   GENSHIN_WEB_WRITE_PASSWORD = password lunga per chi può salvare/importare in web
      # Cookie HTTPS: RENDER è rilevato in web/app.py → SESSION_COOKIE_SECURE attivo.
      # Opzionale: disco persistente Render (consigliato per non perdere DB ai redeploy)
      # - key: GINSHIN_DATA_DIR
      #   value: /var/data
